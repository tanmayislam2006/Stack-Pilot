name: Deploy API to  VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  test-application:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./server

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./server

      - name: Generate Mock Env
        working-directory: ./server
        run: |
          echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy" > .env
          echo "PORT=5000" >> .env
          echo "NODE_ENV=test" >> .env
          echo "BETTER_AUTH_SECRET=mock-secret" >> .env
          echo "BETTER_AUTH_URL=http://localhost:5000" >> .env
          echo "ACCESS_TOKEN_SECRET=mock" >> .env
          echo "ACCESS_TOKEN_EXPIRES_IN=1d" >> .env
          echo "REFRESH_TOKEN_SECRET=mock" >> .env
          echo "REFRESH_TOKEN_EXPIRES_IN=7d" >> .env
          echo "FRONTEND_URL=http://localhost:3000" >> .env

      - name: Run Tests
        run: npm run test
        working-directory: ./server

  build-and-push-image:
    needs: test-application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Create lower case repository name for Docker tagging
      - name: Set lower case repository name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

